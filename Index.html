<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Клікер Гра</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e0f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
    }

    #score {
      font-size: 24px;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #clickButton {
      background-color: #4CAF50;
      color: white;
    }

    #clickButton:hover {
      background-color: #45a049;
    }

    #upgradeButton {
      background-color: #2196F3;
      color: white;
    }

    #upgradeButton:hover {
      background-color: #1976D2;
    }

    #upgradeCost {
      margin-top: 5px;
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Гра Клікер</h1>
  <div id="score">Бали: 0</div>
  <button id="clickButton">Клікни мене!</button>
  <button id="upgradeButton">Покращити клік (+1)</button>
  <div id="upgradeCost">Вартість покращення: 10</div>

  <script>
    let score = 0;
    let pointsPerClick = 1;
    let upgradeCost = 10;

    const scoreDisplay = document.getElementById('score');
    const clickButton = document.getElementById('clickButton');
    const upgradeButton = document.getElementById('upgradeButton');
    const upgradeCostDisplay = document.getElementById('upgradeCost');

    function updateDisplay() {
      scoreDisplay.textContent = `Бали: ${score}`;
      upgradeCostDisplay.textContent = `Вартість покращення: ${upgradeCost}`;
    }

    clickButton.addEventListener('click', () => {
      score += pointsPerClick;
      updateDisplay();
    });

    upgradeButton.addEventListener('click', () => {
      if (score >= upgradeCost) {
        score -= upgradeCost;
        pointsPerClick += 1;
        upgradeCost = Math.floor(upgradeCost * 1.5);
        updateDisplay();
      } else {
        alert("Недостатньо балів для покращення!");
      }
    });

    updateDisplay();
  </script>
</body>
</html>
